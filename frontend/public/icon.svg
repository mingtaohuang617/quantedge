<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0B0B15"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 上升趋势线 -->
  <polyline points="96,360 176,300 240,332 320,220 416,156"
            fill="none" stroke="url(#accent)" stroke-width="22"
            stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- 顶点圆点 -->
  <circle cx="416" cy="156" r="14" fill="#00E5A0" filter="url(#glow)"/>
  <!-- 文字 Q -->
  <text x="256" y="468" font-family="DM Sans, system-ui, sans-serif"
        font-size="72" font-weight="700" fill="#E2E8F0"
        text-anchor="middle" letter-spacing="6">QE</text>
</svg>
