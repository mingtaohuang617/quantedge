name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install backend deps + ruff + pytest
        run: |
          pip install --upgrade pip
          # 装运行时依赖（factors/data_sources 需要 pandas/numpy；test 收集时会 import）
          pip install -r backend/requirements.txt
          pip install ruff pytest
      - name: Ruff check (informational — legacy issues not yet cleaned)
        run: ruff check backend
        continue-on-error: true
      - name: Pytest (no network)
        run: pytest backend/tests -m "not network" --tb=short

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        # 用 npm install 而非 npm ci：现 lock 中部分 optional native deps
        # （@esbuild/netbsd-arm64 等）未标记 optional=true，npm ci 在 Linux 会
        # 报 EBADPLATFORM。npm install 会自动跳过不适配的可选平台依赖。
        run: npm install --no-audit --no-fund
      - name: Vitest
        run: npm test
      - name: Vite build
        run: npm run build
