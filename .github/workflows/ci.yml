name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff + pytest
        run: pip install ruff pytest
      - name: Ruff check (informational — legacy issues not yet cleaned)
        run: ruff check backend
        continue-on-error: true
      - name: Pytest (no network)
        run: pytest backend/tests -m "not network" --tb=short

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Vitest
        run: npm test
      - name: Vite build
        run: npm run build
